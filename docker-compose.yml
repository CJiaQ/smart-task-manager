version: "3"

services:
  mysql:
    image: mysql:8
    container_name: smart-task-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: taskdb
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: .
    container_name: smart-task-backend
    ports:
      - "8080:8080"
    depends_on:
      - mysql

volumes:
  mysql_data: